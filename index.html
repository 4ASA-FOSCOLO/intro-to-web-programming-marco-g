<!DOCTYPE html><html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerVibe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #111;
            color: #eee;
        }header {
        background: #000;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        margin: 0;
        font-size: 1.8rem;
        color: #ffd700;
    }

    nav a {
        margin-left: 20px;
        text-decoration: none;
        color: #eee;
        font-size: 0.9rem;
    }

    nav a:hover {
        color: #ffd700;
    }

    .hero {
        height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1542291026-7eec264c27ff');
        background-size: cover;
        background-position: center;
    }

    .hero h2 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .hero p {
        margin-bottom: 20px;
    }

    .btn {
        padding: 10px 20px;
        background: #ffd700;
        color: #000;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
    }

    .container {
        max-width: 1000px;
        margin: 40px auto;
        padding: 0 20px;
    }

    section {
        margin-bottom: 50px;
    }

    h2 {
        color: #ffd700;
        margin-bottom: 15px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: #1a1a1a;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
    }

    footer {
        background: #000;
        text-align: center;
        padding: 20px;
        font-size: 0.8rem;
    }
</style>

</head>
<body><header>
    <h1>SneakerVibe</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#categorie">Categorie</a>
        <a href="#brand">Brand</a>
        <a href="#offerte">Offerte</a>
        <a href="#contatti">Contatti</a>
    </nav>
</header><section class="hero" id="home">
    <div>
        <h2>Il tuo mondo sneakers</h2>
        <p>Scopri le scarpe più stilose e performanti del momento</p>
        <a href="#offerte" class="btn">Scopri le offerte</a>
    </div>
</section><div class="container"><section id="categorie">
    <h2>Tipi di scarpe</h2>
    <div class="grid">
        <div class="card">Sneakers</div>
        <div class="card">Running</div>
        <div class="card">Basket</div>
        <div class="card">Casual</div>
    </div>
</section><section id="brand">
    <h2>Marche principali</h2>
    <div class="grid">
        <div class="card">Nike</div>
        <div class="card">Adidas</div>
        <div class="card">Puma</div>
        <div class="card">New Balance</div>
        <div class="card">Converse</div>
    </div>
</section><section id="offerte">
    <h2>Offerte del momento</h2>
    <div class="grid">
        <div class="card">
            <h
